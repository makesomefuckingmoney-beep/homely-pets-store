<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Homely Pets</title>
  <meta name="description" content="Homely Pets luxury pet nutrition — product details, subscription bundles &amp; offers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="images/homely-pets-logo.png" type="image/png" />
</head>
<body class="page-product">
  <div class="grain" aria-hidden="true"></div>

  <div class="announcement">
    <span>3 for 1 on selected lines · Subscribe &amp; save 15%</span>
    <span class="announcement__dot">◆</span>
    <span>Free UK delivery over £45</span>
  </div>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo" aria-label="Homely Pets home">
        <img src="images/homely-pets-logo.png" alt="Homely Pets" width="160" height="44" />
      </a>
      <nav class="nav" aria-label="Main">
        <a href="index.html#shop">Shop</a>
        <a href="index.html#about">Story</a>
        <a href="index.html#subscribe">Subscribe</a>
        <a href="track.html">Track order</a>
      </nav>
      <div class="header__actions">
        <button type="button" class="btn btn--cart" id="cart-btn" aria-label="Cart, 0 items">
          <span>Bag</span>
          <span class="cart-count" id="cart-count">0</span>
        </button>
        <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main id="product-main" class="product-page">
    <p class="product-page__loading">Loading product…</p>
  </main>

  <footer class="footer">
    <div class="container footer__bottom">
      <p>&copy; 2026 Homely Pets</p>
      <p class="footer__demo">Secure checkout · Stripe</p>
    </div>
  </footer>

  <aside class="cart-drawer" id="cart-drawer" aria-hidden="true">
    <div class="cart-drawer__panel">
      <header class="cart-drawer__head">
        <h2>Your bag</h2>
        <button type="button" class="cart-drawer__close" id="cart-close" aria-label="Close">&times;</button>
      </header>
      <ul class="cart-drawer__items" id="cart-items"></ul>
      <p class="cart-drawer__empty" id="cart-empty">Your bag is empty.</p>
      <footer class="cart-drawer__foot">
        <p class="cart-drawer__total">Subtotal <strong id="cart-total">£0.00</strong></p>
        <p class="cart-drawer__error" id="checkout-error" role="alert"></p>
        <button type="button" id="checkout-btn" class="btn btn--primary btn--block" disabled>Checkout securely</button>
      </footer>
    </div>
  </aside>
  <div class="overlay" id="overlay" hidden></div>

  <script src="products.js"></script>
  <script src="labels-manifest.js"></script>
  <script src="product-details.js"></script>
  <script src="cart.js"></script>
  <script src="payments.js"></script>
  <script src="cart-ui.js"></script>
  <script src="product-page.js"></script>
</body>
</html>
